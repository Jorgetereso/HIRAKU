<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIRAKU</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 3rem 2rem 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 4rem;
      letter-spacing: 1.2rem;
      color: #ffffff;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.5rem;
      text-transform: uppercase;
      color: #666;
      margin-top: 0.75rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #444, transparent);
      margin: 2rem auto;
    }

    main {
      width: 100%;
      padding: 1rem 2rem 4rem;
      flex: 1;
    }

    .videos {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      align-items: flex-start;
    }

    .video-card {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }

    .video-card:hover {
      border-color: #333;
    }

    .video-wrapper {
      position: relative;
      width: 300px;
      padding-bottom: 177.78%; /* 9:16 portrait */
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-label {
      padding: 1rem;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 0.15rem;
      color: #888;
    }

    footer {
      width: 100%;
      text-align: center;
      padding: 2rem;
      border-top: 1px solid #151515;
    }

    footer p {
      font-size: 0.7rem;
      letter-spacing: 0.3rem;
      text-transform: uppercase;
      color: #444;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .videos {
        flex-direction: column;
        align-items: center;
      }

      .video-card {
        width: 100%;
      }

      .video-wrapper {
        width: 100%;
        max-width: 350px;
        margin: 0 auto;
      }

      h1 {
        font-size: 2.5rem;
        letter-spacing: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Hiraku</h1>
    <p class="subtitle">A multisensory musical visual experience</p>
    <div class="divider"></div>
  </header>

  <main>
    <div class="videos">
      <div class="video-card">
        <div class="video-wrapper">
          <iframe
            src="https://drive.google.com/file/d/1dqINX4BMDI9KuQH8I-Dsv8LmsjOWWM2-/preview"
            allow="autoplay; encrypted-media"
            allowfullscreen>
          </iframe>
        </div>
        <div class="video-label">I</div>
      </div>

      <div class="video-card">
        <div class="video-wrapper">
          <iframe
            src="https://drive.google.com/file/d/1bKiGUnLp91cFSDFMaXfPvkXbZ6ljkNb9/preview"
            allow="autoplay; encrypted-media"
            allowfullscreen>
          </iframe>
        </div>
        <div class="video-label">II</div>
      </div>

      <div class="video-card">
        <div class="video-wrapper">
          <iframe
            src="https://drive.google.com/file/d/1ug4dudEDbfebYYaJcITmcRAiM3ecwAPh/preview"
            allow="autoplay; encrypted-media"
            allowfullscreen>
          </iframe>
        </div>
        <div class="video-label">III</div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; Hiraku 2026</p>
  </footer>

</body>
</html>
